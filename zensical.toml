[project]
site_name = "Kubus"
site_description = "Kubus — a free, open-source Kubernetes GUI. Browse every cluster and resource, stream logs, open shells, forward ports, watch metrics and manage Helm — all from one local web UI."
site_author = "Kubus authors"
site_url = "https://flosch62.github.io/Kubus/"

copyright = """
Copyright &copy; 2026 the Kubus authors — released under the MIT license.
"""

repo_name = "FloSch62/Kubus"
repo_url = "https://github.com/FloSch62/Kubus"
edit_uri = "edit/main/docs/"

extra_css = ["assets/stylesheets/extra.css"]

# Explicit navigation — mirrors the docs/ tree but gives us full control of order
# and titles. Top-level entries become tabs (navigation.tabs is enabled below).
nav = [
  { "Home" = "index.md" },
  { "Install" = [
    "install/index.md",
    { "Desktop app" = "install/desktop.md" },
    { "From source" = "install/from-source.md" },
    { "Quickstart" = "quickstart.md" },
  ] },
  { "User guide" = [
    "guide/index.md",
    { "The Kubus window" = "guide/the-window.md" },
    { "Connecting clusters" = "guide/clusters.md" },
    { "Overview dashboard" = "guide/overview.md" },
    { "Browsing resources" = "guide/browsing-resources.md" },
    { "Smart filters" = "guide/smart-filters.md" },
    { "Resource details & YAML" = "guide/resource-details.md" },
    { "Quick actions" = "guide/quick-actions.md" },
    { "Logs" = "guide/logs.md" },
    { "Shell, debug & node shell" = "guide/shell.md" },
    { "Port forwarding" = "guide/port-forwarding.md" },
    { "Copying files" = "guide/copying-files.md" },
    { "Metrics & health" = "guide/metrics.md" },
    { "Events" = "guide/events.md" },
    { "Security audit" = "guide/security-audit.md" },
    { "Helm releases" = "guide/helm.md" },
    { "Comparing resources" = "guide/diff.md" },
    { "Topology" = "guide/topology.md" },
    { "Command palette" = "guide/command-palette.md" },
    { "Production guard & secrets" = "guide/production-guard.md" },
    { "Settings" = "guide/settings.md" },
  ] },
  { "Reference" = [
    "reference/index.md",
    { "Command-line flags" = "reference/cli.md" },
    { "Keyboard shortcuts" = "reference/keyboard-shortcuts.md" },
    { "Architecture" = "reference/architecture.md" },
    { "Security model" = "reference/security.md" },
  ] },
  { "Community" = [
    "community/index.md",
    { "Contributing" = "community/contributing.md" },
    { "Building from source" = "community/development.md" },
    { "Releasing" = "community/releasing.md" },
    { "Test clusters" = "community/test-clusters.md" },
    { "FAQ" = "community/faq.md" },
  ] },
]

# ----------------------------------------------------------------------------
[project.theme]
language = "en"
logo = "assets/kubus.svg"
favicon = "assets/kubus.svg"

features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
  "toc.follow",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "teal"
accent = "cyan"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/FloSch62/Kubus"

# ----------------------------------------------------------------------------
# Markdown extensions — the same stack containerlab.dev / Material sites use.
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
