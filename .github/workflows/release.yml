name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: # dry run: builds installers without publishing

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Verify release version
        run: node hack/verify-release-version.mjs
      - run: pnpm -r build
      - name: Package and publish
        run: pnpm --filter @kubedeck/electron exec electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No signing certs: skip keychain discovery so mac builds stay unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Upload artifacts (dry run)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: kubedeck-${{ matrix.os }}
          path: |
            electron/release/*.exe
            electron/release/*.dmg
            electron/release/*.zip
            electron/release/*.AppImage
            electron/release/*.deb
