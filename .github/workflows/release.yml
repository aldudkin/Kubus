name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish_tag:
        description: 'Optional existing tag to publish/replace release assets for, e.g. v0.1.1'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.11.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - name: Cache Electron binaries
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Verify release version
        run: node hack/verify-release-version.mjs
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_tag || github.ref_name }}
      - run: pnpm -r build
      - name: Package
        run: pnpm --filter @kubus/electron exec electron-builder --publish never
        env:
          # No signing certs: skip keychain discovery so mac builds stay unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Verify artifacts
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)
              test -n "$(find electron/release -maxdepth 1 -name '*.AppImage' -print -quit)"
              test -n "$(find electron/release -maxdepth 1 -name '*.deb' -print -quit)"
              ;;
            macOS)
              test -n "$(find electron/release -maxdepth 1 -name '*.dmg' -print -quit)"
              ;;
            Windows)
              test -n "$(find electron/release -maxdepth 1 -name '*.exe' -print -quit)"
              ;;
          esac
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kubus-${{ matrix.os }}
          if-no-files-found: error
          path: |
            electron/release/*.exe
            electron/release/*.dmg
            electron/release/*.AppImage
            electron/release/*.deb

  publish:
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_tag != '') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_tag || github.ref_name }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t artifacts < <(find release-assets -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' -o -name '*.exe' \) -print)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No release artifacts found" >&2
            exit 1
          fi

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi

          while IFS= read -r asset_name; do
            case "$asset_name" in
              kubus-*-mac-x64.*|kubus-*-mac-arm64.*|kubus-*.blockmap|latest*.yml)
                gh release delete-asset "$RELEASE_TAG" "$asset_name" --yes
                ;;
            esac
          done < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')

          gh release upload "$RELEASE_TAG" "${artifacts[@]}" --clobber
      # The docs deploy writes site/latest.json from the latest GitHub release,
      # which powers the in-app update check for all installed versions.
      - name: Refresh Pages update manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh workflow run docs.yml --ref main
