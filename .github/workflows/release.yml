name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish_tag:
        description: 'Optional existing tag to publish/replace release assets for, e.g. v0.1.1'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Cache Electron binaries
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Verify release version
        run: node hack/verify-release-version.mjs
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_tag || github.ref_name }}
      - run: pnpm -r build
      - name: Package
        run: pnpm --filter @kubus/electron exec electron-builder --publish never
        env:
          # No signing certs: skip keychain discovery so mac builds stay unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Verify artifacts
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)
              test -n "$(find electron/release -maxdepth 1 -name '*.AppImage' -print -quit)"
              test -n "$(find electron/release -maxdepth 1 -name '*.deb' -print -quit)"
              ;;
            macOS)
              test -n "$(find electron/release -maxdepth 1 -name '*.dmg' -print -quit)"
              ;;
            Windows)
              test -n "$(find electron/release -maxdepth 1 -name '*.exe' -print -quit)"
              ;;
          esac
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kubus-${{ matrix.os }}
          if-no-files-found: error
          path: |
            electron/release/*.exe
            electron/release/*.dmg
            electron/release/*.AppImage
            electron/release/*.deb

  publish:
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_tag != '') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_tag || github.ref_name }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t artifacts < <(find release-assets -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' -o -name '*.exe' \) -print)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No release artifacts found" >&2
            exit 1
          fi

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi

          while IFS= read -r asset_name; do
            case "$asset_name" in
              kubus-*-mac-x64.*|kubus-*-mac-arm64.*|kubus-*.blockmap|latest*.yml)
                gh release delete-asset "$RELEASE_TAG" "$asset_name" --yes
                ;;
            esac
          done < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')

          gh release upload "$RELEASE_TAG" "${artifacts[@]}" --clobber

  deploy-update-manifest:
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_tag != '') }}
    needs: publish
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install zensical
      - name: Build Pages update manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          zensical build --clean --strict
          gh release view "$RELEASE_TAG" --repo "$GH_REPO" --json tagName,name,url,publishedAt > /tmp/kubus-latest-release.json
          node hack/write-latest-manifest.mjs /tmp/kubus-latest-release.json site/latest.json
      - name: Publish Pages branch
        run: |
          publish_dir="$(mktemp -d)"
          cp -a site/. "$publish_dir/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages --depth=1 || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git switch --detach refs/remotes/origin/gh-pages
          else
            git switch --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$publish_dir"/. .
          touch .nojekyll

          git add -A
          if git diff --cached --quiet; then
            echo "Pages branch already up to date."
            exit 0
          fi

          git commit -m "docs: publish ${RELEASE_TAG}"
          git push origin HEAD:gh-pages
