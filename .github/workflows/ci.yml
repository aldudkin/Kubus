name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      # build first: @kubedeck/shared (and /server for electron) resolve types
      # from their dist/, which doesn't exist on a fresh checkout
      - run: pnpm build
      - run: pnpm typecheck
      # Unpacked desktop build so a broken electron-builder config fails PRs.
      - run: pnpm --filter @kubedeck/electron exec electron-builder --dir --linux
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
