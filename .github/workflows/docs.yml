name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "zensical.toml"
      - "hack/write-latest-manifest.mjs"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install zensical
      - run: zensical build --clean --strict
      - name: Write update manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view --repo "$GH_REPO" --json tagName,name,url,publishedAt > /tmp/kubus-latest-release.json; then
            node hack/write-latest-manifest.mjs /tmp/kubus-latest-release.json site/latest.json
          else
            echo "No release metadata available; skipping update manifest."
            rm -f site/latest.json
          fi
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_attempt }}
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
