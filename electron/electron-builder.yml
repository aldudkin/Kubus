appId: io.github.flosch62.kubus
productName: Kubus
executableName: kubus
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - package.json
asar: true
extraResources:
  - from: ../client/dist
    to: client
  - from: ../server/assets/helm-engine.wasm.gz
    to: helm-engine.wasm.gz
  - from: build/icons/256x256.png
    to: icon.png
icon: build/icon.png
artifactName: kubus-${version}-${os}-${arch}.${ext}
protocols:
  - name: Kubus
    schemes: [kubus]
npmRebuild: false
afterPack: scripts/after-pack.cjs
win:
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  category: public.app-category.developer-tools
  identity: null
  notarize: false
  target:
    - target: dmg
      arch: [universal]
dmg:
  sign: false
deb:
  afterInstall: linux/after-install.tpl
linux:
  category: Development
  synopsis: Kubernetes GUI
  icon: build/icons
  desktop:
    entry:
      StartupWMClass: Kubus
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
publish:
  provider: github
  owner: FloSch62
  repo: Kubus
  releaseType: release
